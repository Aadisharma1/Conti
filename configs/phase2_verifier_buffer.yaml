seed: 42
output_dir: ./outputs/phase2_verifier_buffer

model:
  name_or_path: Qwen/Qwen2.5-7B
  torch_dtype: bfloat16
  trust_remote_code: true
  use_lora: true
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.0
  max_seq_length: 2048
  gradient_checkpointing: false  # OFF — we have 96GB, trade memory for speed
  attn_implementation: null

verifier:
  mode: keyword_and_model
  block_patterns:
    - "\\b(bomb|weapon|kill|suicide)\\b"
    - "\\b(how to (make|build) (a )?(meth|explosive))\\b"
  case_insensitive: true
  scorer_model: unitary/toxic-bert
  scorer_threshold: 0.75

replay:
  enabled: true
  safety_samples_per_batch: 8   # more safety anchoring per batch
  dataset_path: null

ewc:
  enabled: false
  lambda_ewc: 5000.0
  fisher_samples: 200

logging:
  use_wandb: false
  wandb_project: conti-safety
  wandb_entity: null
  log_every_n_steps: 10

loop:
  experiment: phase2_verifier_buffer
  num_self_improve_rounds: 3     # 3 rounds instead of 2
  generate_batch_size: 16        # 4x larger gen batches (way faster)
  train_micro_batch_size: 4      # 4x larger train batches (uses ~50-60GB VRAM)
  gradient_accumulation_steps: 4  # effective batch = 16
  learning_rate: 2.0e-5
  num_epochs_per_round: 1
  max_train_samples_per_round: 500  # 2.5x more training data per round
  warmup_ratio: 0.03
  weight_decay: 0.01
  generation_temperature: 0.7
  generation_top_p: 0.95
  generation_max_new_tokens: 768  # longer CoT chains
  eval_every_round: true
  require_correct_trajectory: true
  max_grad_norm: 1.0

data:
  math_dataset: gsm8k
  math_split: train
  math_test_split: test
  safety_eval_datasets:
    - advbench_subset
    - xstest_subset
    - donotanswer_subset
  max_prompts_per_eval: 100  # more thorough eval
